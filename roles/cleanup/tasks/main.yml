- name: Stop known containers
  community.docker.docker_container:
    name: "{{ item }}"
    state: absent
    force_kill: true
  loop:
    - gitlab
    - gitlab-new2
    - gitlab-runner
    - gitlab-runner-new2
    - vault
    - uwsgi
    - nginx
    - celery
    - mysql
    - redis
    - grafana
  ignore_errors: true
- name: Remove ALL Docker volumes
  command: docker volume prune -f

# Explicit removal of key project volumes
- name: Remove GitLab and runner volumes
  community.docker.docker_volume:
    name: "{{ item }}"
    state: absent
  loop:
    - gitlab_data
    - gitlab_runner_data
  ignore_errors: true


- name: Remove GitLab volumes safely
  community.docker.docker_volume:
    name: "{{ item }}"
    state: absent
  loop:
    - gitlab_gitlab_config
    - gitlab_gitlab_data
    - gitlab_gitlab_logs
    - gitlab_runner_config
  ignore_errors: true

- name: Find DefectDojo containers
  command: docker ps -aq --filter "name=defectdojo"
  register: dojo_containers

- name: Remove DefectDojo containers
  command: docker rm -f {{ item }}
  loop: "{{ dojo_containers.stdout_lines }}"
  when: dojo_containers.stdout != ""
  ignore_errors: true



- name: Remove DefectDojo volumes
  community.docker.docker_volume:
    name: "{{ item }}"
    state: absent
  loop:
    - django-defectdojo_defectdojo_media
    - django-defectdojo_defectdojo_postgres
    - django-defectdojo_defectdojo_redis
  ignore_errors: true

- name: Prune unused volumes
  command: docker volume prune -f

- name: Remove unused networks
  command: docker network prune -f

- name: Remove project directories
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/opt/gitlab
    - /etc/gitlab-runner
  ignore_errors: true
