- name: Create GitLab compose directory
  file:
    path: /opt/gitlab
    state: directory

- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: /opt/gitlab/docker-compose.yml

- name: Start GitLab stack
  community.docker.docker_compose_v2:
    project_src: /opt/gitlab
    state: present

- name: Wait for GitLab to be healthy
  uri:
    url: "http://10.22.255.62:9500"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 10
